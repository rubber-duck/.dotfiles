# Gruvbox dark theme for tmux
# Inlined from egel/tmux-gruvbox (commit aeb30c7, 2025-05-29)
# Using hex palette (true color), default status bar values

# Status bar
set-option -gq status "on"
set-option -gq status-style "bg=#3c3836,fg=#ebdbb2"
set-option -gq status-justify "left"
set-option -gq status-left-style none
set-option -gq status-left-length "80"
set-option -gq status-right-style none
set-option -gq status-right-length "80"

# Status left: [session name]
set-option -gq status-left "#[bg=#665c54,fg=#a89984] #S #[bg=#3c3836,fg=#665c54,nobold,noitalics,nounderscore]"

# Status right: [date] [time] [hostname]
set-option -gq status-right "#[bg=#3c3836,fg=#504945,nobold,nounderscore,noitalics]#[bg=#504945,fg=#a89984] %Y-%m-%d  %H:%M #[bg=#504945,fg=#bdae93,nobold,noitalics,nounderscore]#[bg=#bdae93,fg=#3c3836] #h"

# Window titles
set-window-option -gq window-status-style "bg=#fabd2f,fg=#3c3836"
set-window-option -gq window-status-activity-style "bg=#3c3836,fg=#bdae93"
set-window-option -gq window-status-current-style "bg=#fabd2f,fg=#3c3836"
set-window-option -gq window-status-separator ""

# Current window: [index] [terminal title]
set-window-option -gq window-status-current-format "#[bg=#fabd2f,fg=#3c3836,nobold,noitalics,nounderscore]#[bg=#fabd2f,fg=#504945] #I #[bg=#fabd2f,fg=#504945,bold] #{?#{==:#{pane_title},#H},#{pane_current_command},#{pane_title}}#{?window_zoomed_flag,*Z,} #{?window_end_flag,#[bg=#3c3836],#[bg=#3c3836]}#[fg=#fabd2f,nobold,noitalics,nounderscore]"

# Default window: [index] [terminal title]
set-window-option -gq window-status-format "#[bg=#504945,fg=#3c3836,noitalics]#[bg=#504945,fg=#ebdbb2] #I #[bg=#504945,fg=#ebdbb2] #{?#{==:#{pane_title},#H},#{pane_current_command},#{pane_title}} #{?window_end_flag,#[bg=#3c3836],#[bg=#3c3836]}#[fg=#504945,noitalics]"

# Pane borders
set-option -gq pane-active-border-style "fg=#d5c4a1"
set-option -gq pane-border-style "fg=#3c3836"

# Messages
set-option -gq message-style "bg=#504945,fg=#ebdbb2"
set-option -gq message-command-style "bg=#bdae93,fg=#3c3836"

# Pane number display
set-option -gq display-panes-active-colour "#d5c4a1"
set-option -gq display-panes-colour "#3c3836"

# Clock
set-window-option -gq clock-mode-colour "#83a598"

# Bell
set-window-option -gq window-status-bell-style "bg=#fb4934,fg=#282828"
