# Custom tmux keybindings
#
# Paired with the QMK _TMUX layer. QMK sends prefix C-a plus the command key,
# so keep these command keys stable when changing the keyboard layer.

# Window/tab management
bind-key c new-window -c "#{pane_current_path}"
bind-key p previous-window
bind-key n next-window
bind-key l last-window
bind-key w choose-tree -Zw
bind-key , command-prompt -I "#W" "rename-window '%%'"

# With base-index 1, make keyboard 0 select tmux window 10.
bind-key 1 select-window -t :=1
bind-key 2 select-window -t :=2
bind-key 3 select-window -t :=3
bind-key 4 select-window -t :=4
bind-key 5 select-window -t :=5
bind-key 6 select-window -t :=6
bind-key 7 select-window -t :=7
bind-key 8 select-window -t :=8
bind-key 9 select-window -t :=9
bind-key 0 select-window -t :=10

# Pane management
bind-key h split-window -h -c "#{pane_current_path}"
bind-key v split-window -v -c "#{pane_current_path}"
bind-key z resize-pane -Z
bind-key x kill-pane

# Pane movement, matching the QMK arrow cluster.
bind-key Left select-pane -L
bind-key Down select-pane -D
bind-key Up select-pane -U
bind-key Right select-pane -R

# Pane resize. QMK sends full prefix+key sequences, so repeated physical taps work.
bind-key -r H resize-pane -L 5
bind-key -r J resize-pane -D 3
bind-key -r K resize-pane -U 3
bind-key -r L resize-pane -R 5

# Session/config basics
bind-key d detach-client
bind-key r source-file ~/.tmux.conf \; display-message "tmux.conf reloaded"
