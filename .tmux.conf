# Prefix
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# General
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g mouse on
set -g history-limit 50000
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",*:RGB"
set -s set-clipboard external
set -g terminal-features "xterm*:clipboard:ccolour:cstyle:focus:title,screen*:title,rxvt*:ignorefkeys,xterm-ghostty:clipboard,xterm-256color:clipboard"

# Theme
source-file ~/.tmux/gruvbox-dark.conf

# Custom keybindings
source-file ~/.tmux/keybindings.conf
